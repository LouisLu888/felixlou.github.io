name: Send Newsletter

on:
  push:
    branches: [master]
    paths:
      - 'public/blog-posts/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no email sent)'
        type: boolean
        default: true

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Buttondown secret
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          if [ -z "$BUTTONDOWN_API_KEY" ]; then
            echo "::error::BUTTONDOWN_API_KEY is empty."
            echo "Add it under Settings → Environments → github-pages → Environment secrets"
            echo "Or under Settings → Secrets and variables → Actions → Repository secrets."
            echo "Note: Re-running an old failed job uses the old workflow file — run a new workflow instead."
            exit 1
          fi
          echo "BUTTONDOWN_API_KEY is configured."

      - name: Send newsletter for changed posts
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              node scripts/send-newsletter.js --dry-run --post whole-engineer
            else
              node scripts/send-newsletter.js --changed-only
            fi
          else
            node scripts/send-newsletter.js --changed-only
          fi

      - name: Commit sent state
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/.newsletter-sent.json
          if git diff --staged --quiet; then
            echo "No sent-state changes to commit."
          else
            git commit -m "chore: update newsletter sent state"
            git push
          fi
